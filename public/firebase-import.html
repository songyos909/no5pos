<!doctype html><html lang="th"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ย้ายข้อมูล No5POS ไป Firestore</title>
<style>body{font-family:system-ui,sans-serif;max-width:600px;margin:40px auto;padding:20px;background:#f8f5f1;color:#2b1b15}main{background:#fff;padding:24px;border-radius:16px;box-shadow:0 8px 30px #53372a18}input,button{font:inherit;padding:12px;border-radius:8px}input{width:100%;box-sizing:border-box;border:1px solid #cbb8a9;margin:10px 0}button{border:0;background:#53372a;color:#fff;font-weight:700;cursor:pointer}pre{white-space:pre-wrap;background:#f7eee7;padding:12px;border-radius:8px}</style>
<main><h1>ย้ายข้อมูลไป Firestore</h1><p>เปิดหน้านี้จาก <code>http://localhost:3000/firebase-import.html</code> ขณะเปิดระบบ POS ในเครื่องอยู่</p><input id="firebase-email" type="email" value="songyos909@gmail.com" placeholder="Firebase email"><input id="firebase-password" type="password" placeholder="Firebase password"><button id="firebase-login-btn">เข้าสู่ Firebase</button><p id="firebase-login-error"></p><hr><input id="pin" type="password" inputmode="numeric" placeholder="Admin PIN"><button id="run">เริ่มย้ายข้อมูล</button><pre id="out">เข้าสู่ Firebase ก่อน แล้วจึงเริ่มย้ายข้อมูล</pre></main>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script src="./firebase-client.js"></script>
<script>
const out=t=>document.querySelector('#out').textContent=t;
document.querySelector('#run').onclick=async()=>{try{out('กำลังเชื่อมต่อ Firebase…');await window.firebaseReady;const pin=document.querySelector('#pin').value;const req=async(path,admin=false)=>{const r=await fetch(path,{headers:admin?{'x-admin-pin':pin}:{}});if(!r.ok)throw Error(await r.text());return r.json()};const [boot,recipes,transactions]=await Promise.all([req('/api/bootstrap'),req('/api/recipes').catch(()=>[]),req('/api/reports/transactions').catch(()=>[])]);const db=window.firebaseDb;const batchWrite=async(rows,collection,key,convert=x=>x)=>{for(let i=0;i<rows.length;i+=350){const b=db.batch();rows.slice(i,i+350).forEach(x=>{const y=convert(x);b.set(db.collection(collection).doc(String(y[key])),y,{merge:true})});await b.commit()}};const without=(field,x)=>{const copy={...x};delete copy[field];return copy};out('กำลังย้ายเมนูและวัตถุดิบ…');await batchWrite(boot.products,'products','id');await batchWrite(boot.inventory,'inventory','stock_key',x=>without('stock_key',x));await batchWrite(boot.categories,'categories','category_key',x=>without('category_key',x));await batchWrite(boot.channels,'channels','channel_key',x=>without('channel_key',x));await db.collection('settings').doc('features').set(boot.features,{merge:true});const recipeRows=[];recipes.forEach(r=>{db.collection('recipes').doc(String(r.id)).set({description:r.description||''},{merge:true});(r.items||[]).forEach((x,n)=>recipeRows.push({id:`${r.id}_${x.stock_key}_${n}`,product_id:r.id,...x}))});await batchWrite(recipeRows,'recipeItems','id');if(transactions.length){await batchWrite(transactions,'orders','id');const items=[];transactions.forEach(o=>(o.items||[]).forEach((x,n)=>items.push({id:`${o.id}_${n}`,order_id:o.id,...x,status:'completed',created_at:o.created_at,createdAt:o.created_at})));await batchWrite(items,'orderItems','id')}out(`สำเร็จ: เมนู ${boot.products.length} รายการ, วัตถุดิบ ${boot.inventory.length} รายการ, สูตร ${recipeRows.length} รายการ`)}catch(e){out('ผิดพลาด: '+e.message)}};
</script></html>
