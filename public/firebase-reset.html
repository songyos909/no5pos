<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>รีเซ็ตร้าน No.5 Cafe</title><style>body{margin:0;font:16px system-ui,sans-serif;background:#f7f1ea;color:#3d281e;display:grid;min-height:100vh;place-items:center}.card{width:min(520px,90vw);padding:32px;border-radius:22px;background:#fffaf6;box-shadow:0 15px 40px #3d281e22}h1{margin-top:0}label,input{display:block;width:100%;box-sizing:border-box}input{margin:6px 0 16px;padding:12px;border:1px solid #d8c5b6;border-radius:10px;font:inherit}button{width:100%;padding:14px;border:0;border-radius:10px;background:#a43f35;color:#fff;font-weight:800;font-size:16px}button:disabled{opacity:.55}small{color:#806d63}pre{white-space:pre-wrap;color:#806d63}</style></head><body><main class="card"><h1>รีเซ็ตข้อมูลร้านออนไลน์</h1><p>ลบเมนู สูตร สต็อก สมาชิก บิล คิวชง และรายงานจาก Firestore ทั้งหมด การกระทำนี้ย้อนกลับไม่ได้</p><label>อีเมลผู้ดูแล<input id="email" type="email" value="songyos909@gmail.com"></label><label>รหัสผ่าน Firebase<input id="password" type="password"></label><label>พิมพ์ <b>RESET NO5</b> เพื่อยืนยัน<input id="confirm" autocomplete="off"></label><button id="reset" type="button">ล้างข้อมูลออนไลน์ทั้งหมด</button><pre id="status"></pre><small>หลังรีเซ็ต ระบบจะไม่สร้างเมนูตัวอย่างกลับมาเอง</small></main><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script src="./firebase-reset.js"></script></body></html>
