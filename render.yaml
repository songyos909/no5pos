services:
  - type: web
    name: caffe-aroma-pos
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile
    startCommand: npm start
    disk:
      name: cafe-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_PIN
        generateValue: true
